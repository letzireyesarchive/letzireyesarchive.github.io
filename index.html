    <style>
        body {
            font-family: Georgia, sans-serif;
            margin: 0;
            padding: 0;
            background: #f7f7f7;
        }
        
        header {
            background: #00FB89;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        header h1 {
            font-size: 60px;
            font-weight: 900;
            color: #ff2b2b;
            letter-spacing: 2px;
            
        }
        
        nav {
            background: #06065D;
            padding: 10px;
            text-align: center;
            border-bottom: 3px solid #ff2b2b; /* red border */
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 10px;
            border: 2px solid white;
            border-radius: 6px;
            transition: 0.3s ease; /* smooth animation */
            position: relative;
            
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0%;
            height: 2px;
            background: #ff2b2b;
            transition: 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }
            
        .content {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
        }
    </style>
</head>
